<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Greycoat Research — Cat Owner Sign-up</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.12/build/css/intlTelInput.css">
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="mark">G</div>
      <div class="name">Greycoat Research <span>· Feline Kidney Care</span></div>
    </div>

    <nav class="toggle">
      <a href="b2c.html" data-for="b2c">Cat Owner<small>For your cat</small></a>
      <a href="b2b.html" data-for="b2b">Business<small>Clinics & trade</small></a>
    </nav>

    <div class="intro">
      <h1>Kidney care for your cat</h1>
      <p>Tell us about your cat and we'll send guidance grounded in Dr.&nbsp;Toru Miyazaki's AIM research.</p>
    </div>

    <form id="lead-form" novalidate>
      <div class="field">
        <label>Name <span class="req">*</span></label>
        <input type="text" name="name" autocomplete="name" required>
      </div>

      <div class="field">
        <label>Email <span class="req">*</span></label>
        <input type="email" name="email" autocomplete="email" inputmode="email" required>
      </div>

      <div class="field">
        <label>WhatsApp number <span class="req">*</span></label>
        <input type="tel" name="whatsapp" autocomplete="tel">
        <span class="hint">Pick your country — the dial code fills in automatically.</span>
      </div>

      <div class="field">
        <label>Country <span class="req">*</span></label>
        <select name="country" required>
          <option value="" disabled selected>Select your country</option>
        </select>
      </div>

      <div class="field">
        <label>Cat's name</label>
        <input type="text" name="catName">
      </div>

      <div class="field">
        <label>Cat's age</label>
        <input type="text" name="catAge" inputmode="numeric" placeholder="e.g. 8 years">
      </div>

      <div class="field">
        <label>Has your cat been diagnosed with kidney disease?</label>
        <div class="options" data-radio="diagnosed">
          <!-- options injected -->
        </div>
      </div>

      <div class="field">
        <label>What stage is your cat?</label>
        <div class="options" data-radio="stage"></div>
      </div>

      <div class="field">
        <label>Are you currently using any kidney support products?</label>
        <div class="options" data-check="currentProducts"></div>
      </div>

      <div class="field">
        <label>Would you like to receive:</label>
        <div class="options" data-check="interests"></div>
      </div>

      <button type="submit" class="submit">Sign up</button>
      <div class="status" id="status"></div>
    </form>

    <template id="success-tmpl">
      <div class="success">
        <div class="tick">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M4 12.5l5 5L20 6.5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <h2>You're in</h2>
        <p>Thanks — we'll be in touch about your cat's kidney care.</p>
        <button onclick="location.reload()">Add another</button>
      </div>
    </template>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.12/build/js/intlTelInput.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    // ---- option definitions ----
    var RADIO = {
      diagnosed: ['Yes', 'No', 'Not sure'],
      stage: ['Stage 1', 'Stage 2', 'Stage 3', 'Stage 4', 'Not diagnosed']
    };
    var CHECK = {
      currentProducts: ['Dr. Toru Protocol', 'Renal Diet', 'Porus One', 'Azodyl', 'AminAvast', '__other__', 'None'],
      interests: ['Kidney care guide', 'Product updates', 'Clinical case updates']
    };
    var LABELS = { '__other__': 'Others' };

    function tick(kind) {
      return '<span class="box ' + kind + '"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M4 12.5l5 5L20 6.5" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>';
    }
    function renderRadios(group, name) {
      group.innerHTML = RADIO[name].map(function (v) {
        return '<label class="opt"><input type="radio" name="' + name + '" value="' + v + '">' +
          tick('radio') + '<span>' + v + '</span></label>';
      }).join('');
    }
    function renderChecks(group, name) {
      group.innerHTML = CHECK[name].map(function (v) {
        if (v === '__other__') {
          return '<label class="opt"><input type="checkbox" name="' + name + '" value="__other__">' +
            tick('check') + '<span>Others</span></label>' +
            '<div class="opt-other"><input type="text" data-other-for="' + name + '" placeholder="Please specify"></div>';
        }
        return '<label class="opt"><input type="checkbox" name="' + name + '" value="' + v + '">' +
          tick('check') + '<span>' + (LABELS[v] || v) + '</span></label>';
      }).join('');
    }

    Object.keys(RADIO).forEach(function (n) { renderRadios(document.querySelector('[data-radio="' + n + '"]'), n); });
    Object.keys(CHECK).forEach(function (n) { renderChecks(document.querySelector('[data-check="' + n + '"]'), n); });

    // ---- phone + country (shared source so they stay consistent) ----
    var phoneInput = document.querySelector('input[name="whatsapp"]');
    var iti = initPhone(phoneInput);
    var countrySelect = document.querySelector('select[name="country"]');
    // Populate country dropdown from intl-tel-input's data so labels match.
    window.intlTelInput.getCountryData().forEach(function (c) {
      var o = document.createElement('option');
      o.value = c.name; o.textContent = c.name; o.dataset.iso = c.iso2;
      countrySelect.appendChild(o);
    });
    // When phone country changes, sync the country dropdown.
    phoneInput.addEventListener('countrychange', function () {
      var d = iti.getSelectedCountryData();
      var opt = countrySelect.querySelector('option[data-iso="' + d.iso2 + '"]');
      if (opt && !countrySelect.value) countrySelect.value = opt.value;
    });

    // ---- submit ----
    var form = document.getElementById('lead-form');
    var status = document.getElementById('status');
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      var name = val('name'), email = val('email'), country = val('country');
      var phoneOk = iti.isValidNumber();

      var nameEl = form.name_, emailEl = document.querySelector('[name=email]');
      markInvalid(document.querySelector('[name=name]'), !name);
      markInvalid(document.querySelector('[name=email]'), !/^[^@]+@[^@]+\.[^@]+$/.test(email));
      markInvalid(phoneInput, !phoneOk);
      markInvalid(countrySelect, !country);

      if (!name || !/^[^@]+@[^@]+\.[^@]+$/.test(email) || !phoneOk || !country) {
        status.textContent = 'Please complete the highlighted fields.';
        status.className = 'status err';
        return;
      }

      submitLead('B2C', {
        name: name,
        email: email,
        whatsapp: iti.getNumber(),       // E.164, includes country code
        country: country,
        catName: val('catName'),
        catAge: val('catAge'),
        diagnosed: (document.querySelector('[name=diagnosed]:checked') || {}).value || '',
        stage: (document.querySelector('[name=stage]:checked') || {}).value || '',
        currentProducts: checkedValues('currentProducts'),
        interests: checkedValues('interests')
      }, e.submitter, status);
    });
  </script>
</body>
</html>
